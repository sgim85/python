# The backslash in the volume paths point to windows host directories. Adjust as needed for your environment.

version: "3.9"
services:
  db_init:
    build: .
    container_name: video_deduper_db_init
    volumes:
      - C:\data\app_data\video_deduplicator\data:/data
      - ./schema.sql:/schema.sql
    command: ["python", "-c", "import sqlite3; conn = sqlite3.connect('/data/videos.db'); conn.executescript(open('/schema.sql').read()); conn.close()"]

  deduper:
    build: .
    container_name: video_deduper_worker
    environment:
      - DB_PATH=/data/videos.db
      - VIDEO_ROOTS=C:\data\app_data\video_deduplicator\videos
      - HASH_WORKERS=6
    volumes:
      - C:\data\app_data\video_deduplicator\data:/data
      - C:\data\app_data\video_deduplicator\videos:/videos:ro
    depends_on:
      - db_init
    command: ["all"]

  deduper_api:
    image: video_deduper_worker
    container_name: video_deduper_api
    environment:
      - DB_PATH=/data/videos.db
      - VIDEO_ROOTS=C:\data\app_data\video_deduplicator\videos
    volumes:
      - C:\data\app_data\video_deduplicator\data:/data
      - C:\data\app_data\video_deduplicator\videos:/videos:ro
    depends_on:
      - db_init
    ports:
      - "8000:8000"
    command: ["uvicorn", "api_app:app", "--host", "0.0.0.0", "--port", "8000"]